syntax = "proto3";

package com.acme.wallet.v1;

option go_package = "github.com/streamingfast/solana-wallet-tracker-example/pb/com/acme/wallet/v1;pbwallet";

// WalletInfo is the value stored in the Hosted Store for each tracked wallet.
//
// This is the customer-owned type. It is what you select as the store's
// "Type URL" when creating it in The Graph Market, so the store value is a
// `google.protobuf.Any` with type URL:
//
//   type.googleapis.com/com.acme.wallet.v1.WalletInfo
//
// KEY ENCODING: the store key (separate from this value) is the UTF-8 bytes of
// the base58-encoded wallet address. Both the Substreams (Rust) reader and the
// sink `store add` command use this same convention so keys line up.
message WalletInfo {
  // Human-friendly label for the wallet (e.g. "treasury", "vip-customer-42").
  string label = 1;
}
